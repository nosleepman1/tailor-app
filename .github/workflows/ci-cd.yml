name: CI/CD Pipeline

on:
  push:
    branches:
      - main
      - develop
      - staging
  pull_request:
    branches:
      - main
      - develop

env:
  PHP_VERSION: '8.2'
  NODE_VERSION: '20'
  REGISTRY: ghcr.io

jobs:
  # ============================================
  # BACKEND - Tests & Build
  # ============================================
  backend-tests:
    name: Backend - Run Tests
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: ./server

    services:
      postgres:
        image: postgres:15-alpine
        env:
          POSTGRES_USER: postgres
          POSTGRES_PASSWORD: postgres
          POSTGRES_DB: tailor_test
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
        ports:
          - 5432:5432

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup PHP
        uses: shivammathur/setup-php@v2
        with:
          php-version: ${{ env.PHP_VERSION }}
          extensions: pdo, pdo_sqlite, pdo_pgsql, mbstring, zip, pcntl, bcmath, gd, sockets
          key: cache-php-${{ runner.os }}-${{ hashFiles('**/composer.lock') }}
          restore-keys: cache-php-${{ runner.os }}-

      - name: Cache Composer packages
        uses: actions/cache@v3
        with:
          path: server/vendor
          key: ${{ runner.os }}-php-${{ hashFiles('**/composer.lock') }}
          restore-keys: |
            ${{ runner.os }}-php-

      - name: Install dependencies
        run: composer install --no-interaction --prefer-dist

      - name: Setup environment
        run: |
          cp .env.example .env.testing
          php artisan key:generate --env=testing

      - name: Run Pest tests
        run: ./vendor/bin/pest --ci

      - name: Publish Test Results
        if: always()
        uses: dorny/test-reporter@v1
        with:
          name: Pest Test Results
          path: '.phpunit.cache/**/*.junit.xml'
          reporter: 'java-junit'
          fail-on-error: true

  backend-code-quality:
    name: Backend - Code Quality
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: ./server

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup PHP
        uses: shivammathur/setup-php@v2
        with:
          php-version: ${{ env.PHP_VERSION }}
          extensions: pdo, pdo_sqlite, mbstring, zip
          key: cache-php-lint-${{ runner.os }}-${{ hashFiles('**/composer.lock') }}

      - name: Install dependencies
        run: composer install --no-interaction --prefer-dist

      - name: Run Pint (PHP Formatter)
        run: ./vendor/bin/pint --test

      - name: Run PHPStan
        run: |
          if [ -f phpstan.neon ]; then
            ./vendor/bin/phpstan analyse
          else
            echo "PHPStan not configured"
          fi
        continue-on-error: true

  # ============================================
  # FRONTEND - Tests & Build
  # ============================================
  frontend-tests:
    name: Frontend - Build & Test
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: ./client

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: 'npm'
          cache-dependency-path: client/package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: Build frontend
        run: npm run build

      - name: Upload build artifacts
        uses: actions/upload-artifact@v3
        with:
          name: frontend-build
          path: client/dist
          retention-days: 5

  # ============================================
  # DOCKER BUILD - Backend
  # ============================================
  docker-build:
    name: Docker - Build Backend Image
    runs-on: ubuntu-latest
    needs: [backend-tests, backend-code-quality]
    if: github.event_name == 'push' && (github.ref == 'refs/heads/main' || github.ref == 'refs/heads/staging')
    permissions:
      packages: write
      contents: read

    outputs:
      image-tag: ${{ steps.meta.outputs.tags }}

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Extract metadata
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ env.REGISTRY }}/${{ github.repository }}-backend
          tags: |
            type=ref,event=branch
            type=semver,pattern={{version}}
            type=semver,pattern={{major}}.{{minor}}
            type=sha,prefix={{branch}}-

      - name: Build and push Docker image
        uses: docker/build-push-action@v5
        with:
          context: .
          file: ./Dockerfile.backend
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=registry,ref=${{ env.REGISTRY }}/${{ github.repository }}-backend:buildcache
          cache-to: type=registry,ref=${{ env.REGISTRY }}/${{ github.repository }}-backend:buildcache,mode=max

  # ============================================
  # FRONTEND DEPLOYMENT - Vercel
  # ============================================
  frontend-deploy-vercel:
    name: Frontend - Deploy to Vercel
    runs-on: ubuntu-latest
    needs: frontend-tests
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Deploy to Vercel
        uses: vercel/action@main
        with:
          vercel-token: ${{ secrets.VERCEL_TOKEN }}
          vercel-org-id: ${{ secrets.VERCEL_ORG_ID }}
          vercel-project-id: ${{ secrets.VERCEL_PROJECT_ID }}
          working-directory: ./client
          production: true

  # ============================================
  # BACKEND DEPLOYMENT - Production
  # ============================================
  backend-deploy-production:
    name: Backend - Deploy to Production
    runs-on: ubuntu-latest
    needs: docker-build
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    environment: production

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Deploy to Railway (or your PaaS)
        env:
          RAILWAY_TOKEN: ${{ secrets.RAILWAY_TOKEN }}
          RAILWAY_PROJECT_ID: ${{ secrets.RAILWAY_PROJECT_ID }}
        run: |
          npm install -g @railway/cli
          railway link ${{ secrets.RAILWAY_PROJECT_ID }}
          railway up --service backend --detach
        continue-on-error: true

      - name: Alternative: Deploy to Render
        env:
          RENDER_DEPLOY_HOOK: ${{ secrets.RENDER_DEPLOY_HOOK }}
        if: always()
        run: |
          if [ ! -z "${{ secrets.RENDER_DEPLOY_HOOK }}" ]; then
            curl "${{ secrets.RENDER_DEPLOY_HOOK }}"
          fi
        continue-on-error: true

  # ============================================
  # NOTIFICATION
  # ============================================
  notify:
    name: Notify Deployment Status
    runs-on: ubuntu-latest
    needs: [backend-tests, frontend-tests, frontend-deploy-vercel, backend-deploy-production]
    if: always()

    steps:
      - name: Send Slack Notification
        uses: slackapi/slack-github-action@v1.24.0
        if: env.SLACK_WEBHOOK_URL != ''
        env:
          SLACK_WEBHOOK_URL: ${{ secrets.SLACK_WEBHOOK_URL }}
        with:
          payload: |
            {
              "text": "Deployment Status",
              "blocks": [
                {
                  "type": "section",
                  "text": {
                    "type": "mrkdwn",
                    "text": "*Tailor App - ${{ github.ref_name }} Deployment*\n*Status:* ${{ job.status }}\n*Commit:* ${{ github.sha }}\n*Author:* ${{ github.actor }}"
                  }
                }
              ]
            }
