version: '3.9'

services:
  # ============================================
  # PostgreSQL Database
  # ============================================
  postgres:
    image: postgres:15-alpine
    container_name: tailor-postgres
    restart: unless-stopped
    volumes:
      - postgres-data:/var/lib/postgresql/data
      - ./docker/init-db.sql:/docker-entrypoint-initdb.d/init.sql:ro
    environment:
      POSTGRES_USER: ${DB_USERNAME:-tailor_user}
      POSTGRES_PASSWORD: ${DB_PASSWORD:-change_me_secure_password}
      POSTGRES_DB: ${DB_DATABASE:-tailor_prod}
      POSTGRES_INITDB_ARGS: "--encoding=UTF8 --locale=en_US.UTF-8"
    ports:
      - "${DB_PORT:-5432}:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${DB_USERNAME:-tailor_user} -d ${DB_DATABASE:-tailor_prod}"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - tailor-network
    security_opt:
      - no-new-privileges:true

  # ============================================
  # Laravel Backend (Production)
  # ============================================
  backend:
    build:
      context: .
      dockerfile: Dockerfile.backend
    container_name: tailor-backend
    restart: unless-stopped
    depends_on:
      postgres:
        condition: service_healthy
    working_dir: /var/www
    volumes:
      - ./server:/var/www
      - backend-storage:/var/www/storage
      - backend-logs:/var/www/storage/logs
    environment:
      # Application
      APP_NAME: "Tailor"
      APP_ENV: ${APP_ENV:-production}
      APP_DEBUG: ${APP_DEBUG:-false}
      APP_KEY: ${APP_KEY}
      APP_URL: ${APP_URL:-http://localhost:8000}
      
      # Database
      DB_CONNECTION: ${DB_CONNECTION:-pgsql}
      DB_HOST: ${DB_HOST:-postgres}
      DB_PORT: ${DB_PORT:-5432}
      DB_DATABASE: ${DB_DATABASE:-tailor_prod}
      DB_USERNAME: ${DB_USERNAME:-tailor_user}
      DB_PASSWORD: ${DB_PASSWORD:-change_me}
      
      # Cache & Session
      CACHE_DRIVER: ${CACHE_DRIVER:-redis}
      SESSION_DRIVER: ${SESSION_DRIVER:-cookie}
      
      # API
      API_URL: ${API_URL:-https://api.yourdomain.com}
      FRONTEND_URL: ${FRONTEND_URL:-https://yourdomain.com}
      
      # Mail
      MAIL_MAILER: ${MAIL_MAILER:-smtp}
      MAIL_HOST: ${MAIL_HOST:-smtp.mailtrap.io}
      MAIL_PORT: ${MAIL_PORT:-2525}
      MAIL_USERNAME: ${MAIL_USERNAME}
      MAIL_PASSWORD: ${MAIL_PASSWORD}
      MAIL_ENCRYPTION: ${MAIL_ENCRYPTION:-tls}
      MAIL_FROM_ADDRESS: ${MAIL_FROM_ADDRESS:-noreply@tailor.local}
      
      # CORS & Auth
      SANCTUM_STATEFUL_DOMAINS: ${SANCTUM_STATEFUL_DOMAINS:-yourdomain.com,api.yourdomain.com}
      SESSION_DOMAIN: ${SESSION_DOMAIN:-.yourdomain.com}
    ports:
      - "8000:80"
    networks:
      - tailor-network
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:80/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 40s
    security_opt:
      - no-new-privileges:true

  # ============================================
  # Redis Cache (Optional but Recommended)
  # ============================================
  redis:
    image: redis:7-alpine
    container_name: tailor-redis
    restart: unless-stopped
    command: redis-server --appendonly yes --requirepass ${REDIS_PASSWORD:-redis_password}
    volumes:
      - redis-data:/data
    ports:
      - "6379:6379"
    networks:
      - tailor-network
    healthcheck:
      test: ["CMD", "redis-cli", "--raw", "incr", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5
    security_opt:
      - no-new-privileges:true

  # ============================================
  # Frontend (Optional - if not using Vercel)
  # ============================================
  # Uncomment if running frontend in Docker
  # frontend:
  #   build:
  #     context: .
  #     dockerfile: Dockerfile.frontend
  #     target: production
  #   container_name: tailor-frontend
  #   restart: unless-stopped
  #   working_dir: /app
  #   environment:
  #     VITE_API_URL: ${VITE_API_URL:-https://api.yourdomain.com/api/v1}
  #   ports:
  #     - "3000:3000"
  #   networks:
  #     - tailor-network
  #   security_opt:
  #     - no-new-privileges:true

  # ============================================
  # Nginx Reverse Proxy (Optional)
  # ============================================
  # nginx:
  #   image: nginx:latest
  #   container_name: tailor-nginx
  #   restart: unless-stopped
  #   ports:
  #     - "80:80"
  #     - "443:443"
  #   volumes:
  #     - ./docker/nginx.conf:/etc/nginx/nginx.conf:ro
  #     - ./docker/ssl:/etc/nginx/ssl:ro
  #   depends_on:
  #     - backend
  #   networks:
  #     - tailor-network
  #   security_opt:
  #     - no-new-privileges:true

volumes:
  postgres-data:
    driver: local
  backend-storage:
    driver: local
  backend-logs:
    driver: local
  redis-data:
    driver: local

networks:
  tailor-network:
    driver: bridge
