version: '3.8'

services:
  # Backend Laravel avec PHP-FPM et Nginx
  backend:
    build:
      context: .
      dockerfile: Dockerfile.backend
    container_name: tailor-backend
    restart: unless-stopped
    working_dir: /var/www
    volumes:
      - ./server:/var/www
      - ./docker/nginx/conf.d:/etc/nginx/conf.d
      - ./docker/php/php.ini:/usr/local/etc/php/conf.d/custom.ini
      - sqlite-data:/var/www/database
    environment:
      - APP_ENV=local
      - APP_DEBUG=true
      - APP_KEY=
      - DB_CONNECTION=sqlite
      - DB_DATABASE=/var/www/database/database.sqlite
    networks:
      - tailor-network
    depends_on:
      - db
    ports:
      - "8000:80"
    command: >
      sh -c "
      composer install &&
      php artisan key:generate &&
      php artisan migrate --force &&
      php artisan db:seed --force &&
      supervisord -c /etc/supervisor/conf.d/supervisord.conf
      "

  # Base de données SQLite (utilise un volume pour persistance)
  db:
    image: alpine:latest
    container_name: tailor-db
    restart: unless-stopped
    volumes:
      - sqlite-data:/data
    networks:
      - tailor-network
    command: sh -c "tail -f /dev/null"  # container qui reste en vie

  # Frontend React avec Vite
  frontend:
    build:
      context: .
      dockerfile: Dockerfile.frontend
      target: development
    container_name: tailor-frontend
    restart: unless-stopped
    working_dir: /app
    volumes:
      - ./client:/app
      - /app/node_modules
    environment:
      - VITE_API_URL=http://backend:80
      - NODE_ENV=development
    networks:
      - tailor-network
    ports:
      - "5173:5173"
    command: npm run dev -- --host 0.0.0.0

  # (Optionnel) Redis pour cache/queues
  # redis:
  #   image: redis:7-alpine
  #   container_name: tailor-redis
  #   restart: unless-stopped
  #   networks:
  #     - tailor-network

  # (Optionnel) MailHog pour test emails
  # mailhog:
  #   image: mailhog/mailhog:latest
  #   container_name: tailor-mailhog
  #   restart: unless-stopped
  #   networks:
  #     - tailor-network
  #   ports:
  #     - "8025:8025" # Web UI
  #     - "1025:1025" # SMTP

networks:
  tailor-network:
    driver: bridge

volumes:
  sqlite-data: