services:
  backend:
    build:
      context: .
      dockerfile: Dockerfile.backend
    container_name: tailor-backend
    restart: unless-stopped
    working_dir: /var/www
    volumes:
      - ./server:/var/www
      - backend-db:/var/www/database
    environment:
      - APP_ENV=local
      - APP_DEBUG=true
      - APP_KEY=
      - DB_CONNECTION=sqlite
      - DB_DATABASE=/var/www/database/database.sqlite
    ports:
      - "8000:80"
    command: >
      sh -c "cp .env.example .env 2>/dev/null || true &&
             composer install --no-interaction 2>/dev/null || true &&
             php artisan key:generate 2>/dev/null || true &&
             php artisan migrate --force &&
             php artisan storage:link 2>/dev/null || true &&
             /usr/bin/supervisord -c /etc/supervisord.conf"

  frontend:
    build:
      context: .
      dockerfile: Dockerfile.frontend
      target: development
    container_name: tailor-frontend
    restart: unless-stopped
    working_dir: /app
    volumes:
      - ./client:/app
      - /app/node_modules
    environment:
      - VITE_API_URL=http://localhost:8000/api/v1
    ports:
      - "5173:5173"
    depends_on:
      - backend

volumes:
  backend-db:
