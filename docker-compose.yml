services:
  backend:
    build:
      context: .
      dockerfile: Dockerfile.backend
    container_name: tailor-backend
    restart: unless-stopped
    working_dir: /var/www
    volumes:
      - ./server:/var/www
      - backend-db:/var/www/database
    environment:
      - APP_ENV=local
      - APP_DEBUG=true
      - APP_KEY=
      - DB_CONNECTION=sqlite
      - DB_DATABASE=/var/www/database/database.sqlite
      - CACHE_STORE=redis
      - SESSION_DRIVER=redis
      - QUEUE_CONNECTION=redis
      - REDIS_HOST=redis
    ports:
      - "8000:8000"
    command: >
      sh -c "[ ! -f .env ] && cp .env.example .env || true &&
             php artisan key:generate 2>/dev/null || true &&
             php artisan migrate --force || true &&
             php artisan storage:link 2>/dev/null || true &&
             php artisan serve --host=0.0.0.0 --port=8000"

  frontend:
    build:
      context: .
      dockerfile: Dockerfile.frontend
    container_name: tailor-frontend
    restart: unless-stopped
    working_dir: /app
    volumes:
      - ./client:/app
      - /app/node_modules
    environment:
      - VITE_API_URL=http://localhost:8000/api/v1
    ports:
      - "5173:5173"
    depends_on:
      - backend

  redis:
    image: redis:alpine
    container_name: tailor-redis
    restart: unless-stopped
    ports:
      - "6379:6379"
    volumes:
      - redis-data:/data

volumes:
  backend-db:
  redis-data:
